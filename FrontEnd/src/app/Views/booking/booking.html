<div class="container">
  <div class="form">

    <!--This is the header-->
    <div style="border-bottom: 2px solid rgb(229, 229, 229); padding: 20px 20px 20px 20px;">
      <h1>Form</h1>
    </div>


    <!-- Form Content-->
    <div class="form-content">

      <h2>Name</h2>

      <div class="form-item">

        <div style="display: flex; flex-direction: column;">
          <input nz-input type="text" class="input">
          <label class="form-label">First Name</label>

        </div>

        <div style="margin-left: 40px; display: flex; flex-direction: column;">
          <input nz-input type="text" class="input">
          <label class="form-label">Last Name</label>

        </div>

      </div>

      <div class="form-item">

        <label class="form-label">Email</label>
        <input nz-input type="text" class="input-email" placeholder="ex: example@gmail.com">

      </div>

      <div class="form-item">

        <label class="form-label">Phone number</label>
        <input nz-input type="text" class="input" placeholder="(000) 000-000">

      </div>

      <div class="form-item">
        <label class="form-label">Desired Booking Date & Time</label>
        <nz-date-picker [nzRenderExtraFooter]="plainFooter" nzShowTime />
      </div>

      <div class="form-item">
        <label class="form-label">Passenger(s)</label>
        <input type="number" class="form-label-int" min="1" required>

        <p *ngIf="submissionSuccess" class="success-message">{{ successMessage }}</p>
        <p *ngIf="submissionError" class="error-message">{{ errorMessage }}</p>

      </div>

      <div class="form-item">
        <label class="form-label">Service Type</label>

        <nz-select ngModel="default">
          <nz-option nzValue="default" nzLabel="Select a service type" />
          <nz-option nzValue="city-tour" nzLabel="city-tour" />
          <nz-option nzValue="nature-tour" nzLabel="nature-tour" />
        </nz-select>

      </div>

      <div class="form-item">
        <label class="form-label">Tour Type</label>

        <nz-select ngModel="default">
          <nz-option nzValue="default" nzLabel="Select a Tour" />
          <nz-option nzValue="Half-Day Tour" nzLabel="Half-Day Tour" />
          <nz-option nzValue="Full-Day Tour" nzLabel="Full-Day Tour" />
          <nz-option nzValue="Custom Tour" nzLabel="Custom Tour" />
        </nz-select>
      </div>

      <div class="form-item">
        <label for="taxiType">Taxi Type:</label>
        <select id="taxiType" name="taxiType" required>
          <option value="">Select a taxi type</option>
          <option value="vip airport transfer">Vip Airport Transfer</option>
          <option value="stingraycity">Stingray City</option>
          <option value="resturant">Restaurant</option>
        </select>
      </div>

      <button class="submit-button">Submit</button>

    </div>


  </div>


</div>


<div class="booking-form-container">

  <h1>Book Your Next Journey</h1>
  <p>Fill out the form below to book your next tour with us. We look forward to providing you with an unforgettable
    experience!</p>

</div>
