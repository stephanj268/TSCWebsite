<div class="container">
    <h4>Showing {{this.tours.length}} results</h4>

    <div class="section">

        @for(tour of tours; track tour) {
        <div class="card">
            <img class="image-banner" [src]="tour?.thumbnail" [alt]="tours.alt">

            <div style="margin: 10px 10px; font-family: Verdana, Geneva, Tahoma, sans-serif ;">

                <h2>{{tour.name}}</h2>
                <p>Come and enjoy a beautiful tour around <strong>Antigua</strong> </p>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: auto;">
                    <div>
                        <h3>Price <br> <span style="color: rgb(39, 167, 0);">$ {{tour.price}}</span></h3>
                    </div>

                    <button style="border-radius: 9px;" nz-button nzType="default">Book Now!</button>
                </div>

            </div>

        </div>

        }



    </div>
</div>
