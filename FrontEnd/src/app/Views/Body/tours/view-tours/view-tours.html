<div class="container">

    <div class="item">
        <div class="item-block">

            <div style="padding-left: 10px; padding-right: 10px; width: 600px">
                <h1 style="margin-top: 50px; font-size: 30px;">{{tour[0].name}}</h1>

                <div class="tour-img">

                </div>

                <div class="tour-details-border">
                    @if (tour[0].duration > 1) {
                    <h3>{{tour[0].duration}} hours</h3>
                    } @else {
                    <h3>{{tour[0].duration}} hour</h3>
                    }
                </div>

            </div>


            <h2 style="margin-top: 50px; font-size: 30px;">Overview</h2>
            <h3>{{tour[0].description}}</h3>

            <h2>Includes</h2>
            <ul>
                <li>A view of beaches to view</li>
                <li>Option Of Lunches</li>
            </ul>


            <div class="section">



                <div class="card">

                </div>

                <div class="card">

                </div>

            </div>

        </div>

        <div class="item-block banner">

        </div>

    </div>




    <button class="submit-button">Book Now</button>


</div>
