<div>
    <app-slider></app-slider>
</div>




<div class="container">

    <div>
        <label class="text-tag">Our Services</label>

        <h1>What we offer</h1>

    </div>

    <div class="section">

        @for(tours of tour; track tours; let i = $index){
        <div class="card" [class.reverse]="i % 2 !== 0">

            <img class="img" [src]="tours.img" alt="">

            <div style="width: 58%;">
                <label class="bubble">{{tours.slogo}}</label>
                <h1>{{tours.name}}</h1>
                <h3 style="margin-bottom: 20px;"> {{tours.miniDesc}}</h3>

                <button class="button see-more-button" routerLink="../view/{{tours._id}}">Explore</button>
            </div>

        </div>

        }

    </div>

</div>
