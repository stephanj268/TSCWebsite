<nz-carousel 
    nzAutoPlay="true"
    [nzAutoPlaySpeed]="3000"
    nzDots="true"
    nzEffect="fade"
    nzDotPosition="bottom">
  <div nz-carousel-content *ngFor="let slide of slides">
    <img [src]="img" class="carousel-image" 
            [alt]="slide.title">
    <div class="carousel-content">
    
    </div>
  </div>

  
</nz-carousel>
