<div class="container">

    <div class="filter-style">
        <div class="main-filters">
            <nz-date-picker nzPlaceHolder="Select Date" class="nz-date-picker" [(ngModel)]="date"
                (ngModelChange)="onChange($event)" />

            <button class="button" nz-button nz-Type="default">2 Adults</button>

            <button class="button" nz-button nz-Type="default" (click)="showModal()">Filters</button>

        </div>

        <div class="filter-options">
            @for (something of test; track something.label){
            <button class="button" nz-button nz-Type="default">{{something.label}}</button>
            }

        </div>

    </div>
</div>


<!--Extra Content-->


<nz-modal [(nzVisible)]="isVisible" nzTitle="Filters" (nzOnCancel)="handleCancel()" (nzOnOk)="handleOk()">
    <ng-container *nzModalContent>

        <div class="section">
            <label>Duration</label>

        </div>

        <div class="section">
            <label>Rating</label>
            <nz-rate [ngModel]="2" nzAllowHalf />

        </div>


        <div class="section">
            <label>Price</label>


        </div>

        <div class="section">
            <label>Includes</label>

            <nz-checkbox-group [(ngModel)]="value" [style.width.%]="100" (ngModelChange)="log($event)">
                <nz-row>
                    <nz-col nzSpan="8">
                        <label nz-checkbox nzValue="A">A</label>
                    </nz-col>
                    <nz-col nzSpan="8">
                        <label nz-checkbox nzValue="B">B</label>
                    </nz-col>
                    <nz-col nzSpan="8">
                        <label nz-checkbox nzValue="C">C</label>
                    </nz-col>
                    <nz-col nzSpan="8">
                        <label nz-checkbox nzValue="D">D</label>
                    </nz-col>
                    <nz-col nzSpan="8">
                        <label nz-checkbox nzValue="E">E</label>
                    </nz-col>
                </nz-row>
            </nz-checkbox-group>


        </div>
    </ng-container>
</nz-modal>
